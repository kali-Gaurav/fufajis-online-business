name: Build & Release APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Flutter APK
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.32.0'
          cache: true
          
      - name: Get dependencies
        run: flutter pub get
        
      - name: Run analyzer
        run: flutter analyze --no-fatal-warnings
        continue-on-error: true

      - name: Run tests
        run: flutter test
        continue-on-error: true
        
      - name: Build APK
        run: |
          flutter build apk --release --split-per-abi \
            --dart-define=RAZORPAY_KEY_ID=${{ secrets.RAZORPAY_KEY_ID }} \
            --dart-define=SHOP_LATITUDE=${{ secrets.SHOP_LATITUDE }} \
            --dart-define=SHOP_LONGITUDE=${{ secrets.SHOP_LONGITUDE }} \
            --dart-define=DELIVERY_RADIUS_KM=8 \
            --dart-define=SENTRY_DSN=${{ secrets.SENTRY_DSN }}
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-v1.1.0
          path: build/app/outputs/flutter-apk/app-release*.apk
          retention-days: 30
          
      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          body_path: docs/RELEASE_NOTES.md
          files: |
            build/app/outputs/flutter-apk/app-release-arm64-v8a.apk
            build/app/outputs/flutter-apk/app-release-armeabi-v7a.apk
            build/app/outputs/flutter-apk/app-release-x86_64.apk
          tag_name: v1.1.0+${{ github.run_number }}
          name: Fufaji Online v1.1.0 Build ${{ github.run_number }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
