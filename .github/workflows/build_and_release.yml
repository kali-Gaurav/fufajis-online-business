name: Build & Release Custom APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Flutter APK
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.19.0'
          cache: true
          
      - name: Get dependencies
        run: flutter pub get

      - name: Run unit tests
        run: flutter test --coverage
        continue-on-error: true

      - name: Analyze code
        run: flutter analyze
        continue-on-error: true

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo $KEYSTORE_BASE64 | base64 -d > android/app/upload-keystore.jks
          
      - name: Create key.properties
        run: |
          cat <<EOF > android/key.properties
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF
        
      - name: Build APK
        run: |
          flutter build apk --release \
            --dart-define=API_BASE_URL=${{ secrets.API_BASE_URL }} \
            --dart-define=GOOGLE_MAPS_KEY=${{ secrets.GOOGLE_MAPS_KEY }} \
            --dart-define=STRIPE_PUBLISHABLE_KEY=${{ secrets.STRIPE_PUBLISHABLE_KEY }}
        env:
          # ========================================================================
          # CRITICAL SECURITY FIX: Secrets NOT Embedded in APK
          # ========================================================================
          # The following are NOW LOADED AT RUNTIME from backend /config/app-config:
          #
          # REMOVED (Server-side only, NEVER in app):
          #   - RAZORPAY_KEY_SECRET (payment secret)
          #   - RAZORPAY_WEBHOOK_SECRET (webhook verification)
          #
          # REMOVED (Load from /config/app-config endpoint):
          #   - RAZORPAY_KEY_ID (public, but centralized for easier updates)
          #   - SENTRY_DSN (error tracking DSN)
          #   - SHOP_LATITUDE / SHOP_LONGITUDE (store location)
          #   - SUPABASE_URL / SUPABASE_ANON_KEY (if needed)
          #
          # Implementation: See lib/services/runtime_config_service.dart
          #
          # Benefit: If a secret is compromised, just update AWS SSM parameter
          # on backend. No need to rebuild/redeploy APK. Immediate fix.
          # ========================================================================
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
        
      - name: Upload APK to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          token: ${{ secrets.FIREBASE_TOKEN }}
          groups: employees
          file: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
          
      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/flutter-apk/app-release.apk
          tag_name: v1.1.0+${{ github.run_number }}
          name: Fufaji Online v1.1.0 Build ${{ github.run_number }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
