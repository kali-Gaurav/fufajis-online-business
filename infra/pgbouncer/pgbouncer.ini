; ═══════════════════════════════════════════════════════════════════════
; PgBouncer config template for Fufaji Store
; ═══════════════════════════════════════════════════════════════════════
;
; Only needed if NOT using Supabase's built-in pooler (port 6543), which is
; PgBouncer-as-a-service and requires zero infrastructure of your own — see
; docs/POSTGRES_CONNECTION_POOLING.md for when to prefer each option.
;
; Deploy this on a small always-on host (e.g. a t4g.micro EC2 instance, or a
; tiny Cloud Run service with min-instances=1) sitting between Cloud
; Functions and RDS. Cloud Functions then connect to THIS host on
; `listen_port` instead of RDS directly.
;
; Install: apt-get install pgbouncer  (or the official Docker image
; edoburu/pgbouncer / bitnami/pgbouncer)

[databases]
; Route all incoming connections (any database name) to the real RDS
; Postgres database. Replace HOST/PORT/DBNAME with your RDS endpoint values
; (see `rds.host` / `rds.port` / `rds.database` from
; `firebase functions:config:get`).
* = host=YOUR_RDS_ENDPOINT.rds.amazonaws.com port=5432 dbname=postgres

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432

; Transaction pooling: a backend connection is assigned to a client only for
; the duration of one transaction, then returned to the pool. This is the
; mode compatible with node-postgres's default usage in this codebase
; (no session-level SET/LISTEN/advisory-locks-across-statements, no named
; prepared statements — both true of functions/aws_services.js#getPgPool
; and scripts/migration/lib/pg.js).
pool_mode = transaction

; Auth: PgBouncer needs its own credential store (does not proxy auth to
; Postgres by default in transaction mode for performance). Generate
; userlist.txt from userlist.txt.example.
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

; Per-database connection limits to Postgres. Keep this comfortably under
; your RDS instance's `max_connections` (check via
; `SHOW max_connections;` — db.t3.micro defaults to ~87).
max_client_conn = 200
default_pool_size = 20
min_pool_size = 0
reserve_pool_size = 5
reserve_pool_timeout = 3

; Logging
admin_users = pgbouncer_admin
stats_users = pgbouncer_admin
logfile = /var/log/pgbouncer/pgbouncer.log
pidfile = /var/run/pgbouncer/pgbouncer.pid

; TLS to RDS (RDS requires SSL for most instances)
server_tls_sslmode = require
