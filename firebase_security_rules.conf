// Firestore Security Rules (Enterprise Grade)

service cloud.firestore {
  match /databases/{database}/documents {

    // Helper: Check if user is an authenticated Owner
    function isOwner() {
      return request.auth != null &&
             get(/databases/$(database)/documents/users/$(request.auth.uid)).data.role == 'UserRole.shopOwner';
    }

    // Helper: Check if user is an authenticated Rider
    function isRider() {
      return request.auth != null &&
             get(/databases/$(database)/documents/users/$(request.auth.uid)).data.role == 'UserRole.deliveryAgent';
    }

    // --- Pre-Authorized Users (Security Critical) ---
    match /pre_authorized_users/{phone} {
      allow read: if request.auth != null; // Riders/Owners need to check their status
      allow write: if isOwner(); // ONLY Fufaji can whitelist new staff
    }

    // --- Products (Operational) ---
    match /products/{productId} {
      allow read: if true; // Publicly viewable for SEO/Speed
      allow write: if isOwner(); // ONLY Owner can manage inventory
    }

    // --- Orders (Transactional) ---
    match /orders/{orderId} {
      allow create: if request.auth != null; // Any verified user can order
      allow read: if request.auth != null &&
                  (resource.data.customerId == request.auth.uid || isOwner() || isRider());
      allow update: if request.auth != null && (isOwner() || isRider());
    }

    // --- User Profiles ---
    match /users/{userId} {
      allow read, write: if request.auth != null && request.auth.uid == userId;
    }
  }
}
