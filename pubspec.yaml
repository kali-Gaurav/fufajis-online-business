name: fufajis_online
description: A Flutter e-commerce application for Fufaji Online Business

publish_to: 'none'

version: 1.0.2+3

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Core dependencies
  cloud_firestore: ^4.14.0
  firebase_auth: ^4.15.3
  firebase_storage: ^11.3.0
  firebase_core: ^2.24.2
  firebase_messaging: ^14.7.1
  cloud_functions: ^4.6.1
  firebase_app_check: ^0.2.1
  firebase_remote_config: ^4.3.1
  firebase_analytics: ^10.7.1

  # State management
  provider: ^6.1.0

  # UI & Navigation
  go_router: ^13.0.0
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0
  google_fonts: ^6.2.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  pinput: ^4.0.1
  lottie: ^3.1.0
  infinite_scroll_pagination: ^4.0.0

  # Scanner & Camera
  mobile_scanner: ^5.0.0
  camera: ^0.10.6
  google_mlkit_commons: ^0.7.1
  google_mlkit_barcode_scanning: ^0.12.0
  google_mlkit_image_labeling: ^0.12.0
  google_mlkit_text_recognition: ^0.12.0
  image_picker: ^1.0.7

  # Location
  geolocator: ^10.1.1
  geocoding: ^2.1.1
  google_maps_flutter: ^2.5.3
  permission_handler: ^11.4.4

  # Utilities
  uuid: ^4.2.0
  google_mobile_ads: ^5.1.0
  dio: ^5.4.1
  flutter_local_notifications: ^17.1.0
  shared_preferences: ^2.2.2
  connectivity_plus: ^5.0.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  sqflite: ^2.3.3
  path: ^1.9.0
  url_launcher: ^6.2.4
  share_plus: ^7.2.1
  path_provider: ^2.1.2
  image: ^4.1.3
  flutter_dotenv: ^5.1.0
  package_info_plus: ^9.0.2
  crypto: ^3.0.3
  http: ^1.1.0

  # Payments
  razorpay_flutter: ^1.3.6

  # Charts & Analytics
  fl_chart: ^0.64.0

  # PDF & Documents
  pdf: ^3.10.4
  printing: ^5.11.3

  # WhatsApp Integration
  whatsapp_unilink: ^2.1.0

  # Audio & Speech
  record: ^5.1.1
  speech_to_text: ^7.4.0
  video_player: ^2.8.3

  # Date & Time
  date_time_picker_plus: ^1.0.1

  # Hardware
  blue_thermal_printer: ^1.2.8

  # Error Reporting & OTA
  sentry_flutter: ^7.14.0
  shorebird_code_push: ^2.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  mockito: ^5.4.4

flutter:
  uses-material-design: true

  assets:
    - .env
    - shorebird.yaml
