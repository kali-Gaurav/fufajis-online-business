name: fufajis_online
description: A Flutter e-commerce application for Fufaji Online Business

publish_to: 'none'

version: 1.0.1+2

environment:
  sdk: '>=3.11.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Core dependencies
  cloud_firestore: ^4.13.0
  firebase_auth: ^4.15.0
  firebase_storage: ^11.2.0
  firebase_core: ^2.24.0
  firebase_messaging: ^14.7.0
  cloud_functions: ^4.6.0
  firebase_app_check: ^0.2.0
  firebase_remote_config: ^4.3.0
  firebase_analytics: ^10.7.0

  # State management
  provider: ^6.0.0
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0

  # UI & Navigation
  go_router: ^12.0.0
  flutter_localizations:
    sdk: flutter
  intl: any
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  pinput: ^4.0.0
  lottie: ^3.0.0
  infinite_scroll_pagination: ^4.0.0

  # Scanner & Camera
  mobile_scanner: ^3.5.0
  camera: ^0.10.5
  google_mlkit_commons: ^0.7.1
  google_mlkit_barcode_scanning: ^0.12.0
  google_mlkit_image_labeling: ^0.12.0
  google_mlkit_text_recognition: ^0.12.0
  image_picker: ^1.0.4

  # Location
  geolocator: ^10.1.0
  geocoding: ^2.1.0
  google_maps_flutter: ^2.5.3
  permission_handler: ^11.0.0

  # utilities
  uuid: ^4.2.0
  google_mobile_ads: ^5.1.0
  dio: ^5.4.0
  flutter_local_notifications: ^17.0.0
  shared_preferences: ^2.2.0
  connectivity_plus: ^5.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  sqflite: ^2.3.0
  path: ^1.9.0
  url_launcher: ^6.2.0
  share_plus: ^7.2.0
  path_provider: ^2.1.0
  image: ^4.1.0
  flutter_dotenv: ^5.1.0
  package_info_plus: ^9.0.1
  crypto: ^3.0.3
  http: ^1.1.0

  # Payments
  razorpay_flutter: ^1.3.0

  # Charts & Analytics
  fl_chart: ^0.63.0

  # PDF & Documents
  pdf: ^3.10.0
  printing: ^5.11.0

  # WhatsApp Integration
  whatsapp_unilink: ^2.1.0

  # Audio & Speech
  record: ^5.1.0
  speech_to_text: ^7.4.0
  video_player: ^2.8.1

  # Date & Time
  date_time_picker_plus: ^1.0.1

  # Hardware
  blue_thermal_printer: ^1.2.3

  # Error Reporting & OTA
  sentry_flutter: ^7.12.0
  shorebird_code_push: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  json_serializable: ^6.7.0
  mockito: ^5.4.4

dependency_overrides:
  record_platform_interface: 1.2.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - shorebird.yaml
    # - assets/images/
    # - assets/icons/

