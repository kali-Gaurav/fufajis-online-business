name: fufajis_online
description: A Flutter e-commerce application for Fufaji Online Business

publish_to: 'none'

version: 1.2.0+6

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.0

  # Firebase packages (aligned with FlutterFire BoM July 2026)
  cloud_firestore: ^6.0.0
  firebase_auth: ^6.0.0
  firebase_storage: ^12.0.0
  firebase_core: ^3.0.0
  firebase_messaging: ^16.0.0
  cloud_functions: ^5.0.0
  firebase_app_check: ^0.3.0
  firebase_remote_config: ^6.0.0
  firebase_analytics: ^11.0.0
  firebase_performance: ^0.10.0
  firebase_database: ^12.0.0
  firebase_crashlytics: ^5.0.0
  google_generative_ai: ^0.4.7

  # State management
  provider: ^6.1.5+1
  riverpod: ^2.0.0
  flutter_riverpod: ^2.0.0

  # UI & Navigation
  go_router: ^14.0.0
  flutter_localizations:
    sdk: flutter
  intl: ">=0.18.0 <0.21.0"
  google_fonts: ^6.2.0
  cached_network_image: ^3.0.0
  shimmer: ^3.0.0
  flutter_animate: ^4.5.2
  pinput: ^6.0.2
  lottie: ^3.1.0
  intl_phone_number_input: ^0.7.5
  infinite_scroll_pagination: ^4.0.0

  # Scanner & Camera
  mobile_scanner: ^3.5.0
  camera: ^0.10.0
  google_mlkit_commons: ^0.3.0
  google_mlkit_barcode_scanning: ^0.6.0
  google_mlkit_image_labeling: ^0.6.0
  google_mlkit_text_recognition: ^0.6.0
  image_picker: ^1.0.0

  # Location & Maps
  geolocator: ^12.0.0
  geocoding: ^4.0.0
  google_maps_flutter: ^2.6.0
  permission_handler: ^10.0.0
  flutter_background_service: ^5.0.10
  workmanager: ^0.7.0
  flutter_polyline_points: ^3.0.0
  flutter_map: ^7.0.0
  latlong2: ^0.9.1

  # Utilities
  uuid: ^4.5.3
  google_mobile_ads: ^5.0.0
  dio: ^5.10.0
  flutter_local_notifications: ^18.0.0
  shared_preferences: ^2.3.0
  connectivity_plus: ^7.2.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  sqflite: ^2.3.0
  path: ^1.9.0
  url_launcher: ^6.1.0
  share_plus: ^10.0.0
  path_provider: ^2.1.0
  image: ^4.0.0
  flutter_dotenv: ^6.0.1
  package_info_plus: ^9.0.0
  crypto: ^3.0.0
  http: ^1.2.2
  decimal: ^2.0.0
  timeago: ^3.7.1
  otp: ^3.2.0

  # Payments
  razorpay_flutter: ^1.4.5

  # Security - Hashing & Encryption
  bcrypt: ^1.1.0

  # Charts & Analytics
  fl_chart: ^0.65.0

  # PDF & Documents
  pdf: ^3.0.0
  printing: ^5.0.0

  # WhatsApp Integration
  whatsapp_unilink: ^2.1.0

  # Audio & Speech
  record: ^5.2.0
  speech_to_text: ^6.0.0
  video_player: ^2.0.0
  flutter_tts: ^4.0.0

  # Hardware
  blue_thermal_printer: ^1.2.3

  # Error Reporting & OTA
  sentry_flutter: ^8.0.0
  shorebird_code_push: ^1.0.0
  google_sign_in: ^6.2.0
  qr_flutter: ^4.1.0

  # Authentication & Security
  local_auth: ^2.0.0
  device_info_plus: ^10.0.0
  flutter_secure_storage: ^10.3.1
  supabase_flutter: ^2.0.0
  sign_in_with_apple: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  json_serializable: ^6.8.0
  mockito: ^5.4.0

  firebase_core_platform_interface: any
  cloud_firestore_platform_interface: any
  connectivity_plus_platform_interface: any
  sqflite_common: any

# Using overrides to resolve transitive dependency conflicts between latest versions
dependency_overrides:
  timezone: ^0.9.0
  xml: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    # SECURITY NOTICE: .env is NEVER listed here — never bundle secrets in APK assets.
    - shorebird.yaml
    - assets/images/
    - assets/icons/
    - assets/lottie/
    - assets/data/
