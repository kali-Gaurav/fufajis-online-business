name: fufajis_online
description: A Flutter e-commerce application for Fufaji Online Business

publish_to: 'none'

version: 1.2.0+6

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.9

  # Firebase packages (aligned with FlutterFire BoM July 2026)
  cloud_firestore: ^6.6.0
  firebase_auth: ^6.5.4
  firebase_storage: ^13.4.3
  firebase_core: ^4.11.0
  firebase_messaging: ^16.4.1
  cloud_functions: ^6.3.3
  firebase_app_check: ^0.4.5
  firebase_remote_config: ^6.5.3
  firebase_analytics: ^12.4.3
  firebase_performance: ^0.11.4+3
  firebase_database: ^12.4.4
  firebase_crashlytics: ^5.2.4
  firebase_ai: ^3.13.1
  google_generative_ai: ^0.4.7

  # State management
  provider: ^6.1.5+1
  riverpod: ^3.3.2
  flutter_riverpod: ^3.3.2

  # UI & Navigation
  go_router: ^17.3.0
  flutter_localizations:
    sdk: flutter
  intl: ">=0.19.0 <0.21.0"
  google_fonts: ^8.1.0
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.2
  pinput: ^6.0.2
  lottie: ^3.3.3
  intl_phone_number_input: ^0.7.5
  infinite_scroll_pagination: ^5.1.1

  # Scanner & Camera
  mobile_scanner: ^7.2.0
  camera: ^0.12.0+1
  google_mlkit_commons: ^0.11.1
  google_mlkit_barcode_scanning: ^0.14.2
  google_mlkit_image_labeling: ^0.14.2
  google_mlkit_text_recognition: ^0.15.1
  image_picker: ^1.2.3

  # Location & Maps
  geolocator: ^14.0.3
  geocoding: ^4.0.0
  google_maps_flutter: ^2.17.1
  permission_handler: ^12.0.1
  flutter_background_service: ^5.0.10
  workmanager: ^0.9.0+3
  flutter_polyline_points: ^3.1.0
  flutter_map: ^8.3.1
  latlong2: ^0.10.1

  # Utilities
  uuid: ^4.5.3
  google_mobile_ads: ^9.0.0
  dio: ^5.10.0
  flutter_local_notifications: ^22.0.1
  shared_preferences: ^2.5.5
  connectivity_plus: ^7.2.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  sqflite: ^2.4.3
  path: ^1.9.0
  url_launcher: ^6.3.2
  share_plus: ^13.2.0
  path_provider: ^2.1.6
  image: ^4.9.1
  flutter_dotenv: ^6.0.1
  package_info_plus: ^10.2.0
  crypto: ^3.0.5
  http: ^1.2.2
  decimal: ^3.2.4
  timeago: ^3.7.1
  otp: ^3.2.0

  # Payments
  razorpay_flutter: ^1.4.5

  # Security - Hashing & Encryption
  bcrypt: ^1.2.0

  # Charts & Analytics
  fl_chart: ^1.2.0

  # PDF & Documents
  pdf: ^3.13.0
  printing: ^5.15.0

  # WhatsApp Integration
  whatsapp_unilink: ^2.1.0

  # Audio & Speech
  record: ^7.1.1
  speech_to_text: ^7.4.0
  video_player: ^2.11.1
  flutter_tts: ^4.2.5

  # Date & Time
  date_time_picker_plus: ^1.0.2

  # Hardware
  blue_thermal_printer: ^1.2.3

  # Error Reporting & OTA
  sentry_flutter: ^9.22.0
  shorebird_code_push: ^2.0.6
  google_sign_in: ^7.2.0
  qr_flutter: ^4.1.0

  # Authentication & Security
  local_auth: ^3.0.1
  device_info_plus: ^13.2.0
  flutter_secure_storage: ^10.3.1
  supabase_flutter: ^2.15.3
  sign_in_with_apple: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  json_serializable: ^6.8.0
  mockito: ^5.4.0
  fake_cloud_firestore: ^4.1.1

  firebase_core_platform_interface: any
  cloud_firestore_platform_interface: any
  connectivity_plus_platform_interface: any
  sqflite_common: any

# Using overrides to resolve transitive dependency conflicts between latest versions
dependency_overrides:
  timezone: ^0.11.0
  xml: ^7.0.0

flutter:
  uses-material-design: true

  assets:
    # SECURITY NOTICE: .env is NEVER listed here — never bundle secrets in APK assets.
    - shorebird.yaml
    - assets/images/
    - assets/icons/
    - assets/lottie/
    - assets/data/
