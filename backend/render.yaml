services:
  - type: web
    name: fufaji-backend
    runtime: node
    plan: standard
    buildCommand: |
      echo "🧹 Cleaning old artifacts..."
      rm -rf node_modules package-lock.json dist
      echo "📦 Installing dependencies with npm ci..."
      npm ci --legacy-peer-deps --verbose
      echo "✅ Build complete"
    startCommand: npm start
    preDeployCommand: |
      echo "⏳ Pre-deployment checks..."
      npm list speakeasy
      echo "✅ All modules present"
    envVars:
      - key: NODE_ENV
        value: production
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_KEY
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: TWILIO_WHATSAPP_NUMBER
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: SENDGRID_FROM_EMAIL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: MFA_ENCRYPTION_KEY
        sync: false
      - key: PORT
        value: "3001"
      - key: LOG_LEVEL
        value: info
    healthCheckPath: /health
    region: oregon
    autoDeploy: true
    maxInstances: 3
    minInstances: 1

  # ── Firestore Sync Worker ──────────────────────────────────────────────────
  # Polls outbox_events table every 5s and mirrors changes to Firestore.
  # This decouples Firebase Admin SDK from Supabase Edge Functions completely.
  - type: worker
    name: fufaji-firestore-sync
    runtime: node
    plan: starter
    region: oregon
    autoDeploy: true
    buildCommand: npm ci --legacy-peer-deps
    startCommand: node src/services/firestore-sync-worker.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        fromService:
          name: fufaji-backend
          type: web
          envVarKey: SUPABASE_URL
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_KEY
        sync: false
      - key: LOG_LEVEL
        value: info

