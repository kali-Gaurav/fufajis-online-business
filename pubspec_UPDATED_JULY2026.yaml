name: fufajis_online
description: A Flutter e-commerce application for Fufaji Online Business

publish_to: 'none'

version: 1.2.0+4

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase packages (all updated to latest)
  cloud_firestore: ^6.8.3
  firebase_auth: ^6.7.0
  firebase_storage: ^13.6.6
  firebase_core: ^4.13.4
  firebase_messaging: ^16.4.1  # ⚠️ Major update available (17.x) - test before upgrading
  cloud_functions: ^6.5.0
  firebase_app_check: ^0.5.4
  firebase_remote_config: ^6.6.0
  firebase_analytics: ^12.5.3
  firebase_performance: ^0.11.4+3
  firebase_database: ^12.7.3
  firebase_crashlytics: ^5.3.3
  firebase_ai: ^3.13.0
  google_generative_ai: ^0.4.5

  # State management
  provider: ^6.4.1
  riverpod: ^3.2.1
  flutter_riverpod: ^3.3.1

  # UI & Navigation
  go_router: ^16.2.0
  flutter_localizations:
    sdk: flutter
  intl: ">=0.19.0 <0.21.0"
  google_fonts: ^6.3.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  pinput: ^6.0.2
  lottie: ^3.1.2
  intl_phone_number_input: ^0.8.1
  infinite_scroll_pagination: ^5.1.1

  # Scanner & Camera
  mobile_scanner: ^7.2.0
  camera: ^0.11.2+1
  google_mlkit_commons: ^0.11.0
  google_mlkit_barcode_scanning: ^0.14.1
  google_mlkit_image_labeling: ^0.14.1
  google_mlkit_text_recognition: ^0.15.0
  image_picker: ^1.1.2

  # Location
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  google_maps_flutter: ^2.14.0
  permission_handler: ^12.0.3
  flutter_background_service: ^5.0.10
  workmanager: ^0.8.1  # ✅ Updated - requires Flutter >=3.32.0
  flutter_polyline_points: ^2.1.0
  flutter_map: ^8.3.0
  latlong2: ^0.9.1

  # utilities
  uuid: ^4.8.1
  google_mobile_ads: ^6.0.0
  dio: ^5.7.0
  flutter_local_notifications: ^19.5.0
  shared_preferences: ^2.4.12
  connectivity_plus: ^7.1.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  sqflite: ^2.4.2
  path: ^1.9.1
  url_launcher: ^6.3.2
  share_plus: ^12.0.2
  path_provider: ^2.1.5
  image: ^4.3.0
  flutter_dotenv: ^6.0.1
  package_info_plus: ^9.0.0
  crypto: ^3.0.5
  http: ^1.2.2
  decimal: ^2.3.3
  timeago: ^3.7.1
  otp: ^3.1.2

  # Payments
  razorpay_flutter: ^1.4.5

  # Security - Hashing & Encryption
  bcrypt: ^1.2.0

  # Charts & Analytics
  fl_chart: ^0.69.0

  # PDF & Documents
  pdf: ^3.11.1
  printing: ^5.13.2

  # WhatsApp Integration
  whatsapp_unilink: ^2.1.0

  # Audio & Speech
  record: ^6.2.1
  speech_to_text: ^7.4.0
  video_player: ^2.10.1
  flutter_tts: ^4.2.5

  # Date & Time
  date_time_picker_plus: ^1.0.1

  # Hardware
  blue_thermal_printer: ^1.2.3

  # Error Reporting & OTA
  sentry_flutter: ^9.22.0
  shorebird_code_push: ^2.0.0
  google_sign_in: ^6.2.1
  qr_flutter: ^4.1.0

  # Authentication & Security
  local_auth: ^2.1.6
  device_info_plus: ^12.4.0
  flutter_secure_storage: ^10.3.1
  supabase_flutter: ^2.15.0
  sign_in_with_apple: ^7.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  json_serializable: ^6.9.0
  mockito: ^5.4.4
  fake_cloud_firestore: ^4.1.1

  firebase_core_platform_interface: any
  cloud_firestore_platform_interface: any
  connectivity_plus_platform_interface: any
  sqflite_common: any

flutter:
  uses-material-design: true

  assets:
    # ⚠️ CRITICAL: .env is NEVER listed here — never bundle secrets in APK assets.
    # The app reads public Razorpay key from AppConfig via --dart-define at build time.
    # Secrets are fetched at runtime from backend /config endpoint.
    # - .env  (REMOVED - DO NOT INCLUDE)
    - shorebird.yaml
    - assets/images/
    - assets/icons/
    - assets/lottie/
